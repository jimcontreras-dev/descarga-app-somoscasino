function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = useState(false);
  const dragRef = useRef(null);
  const offsetRef = useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ title, children }) {

function TweakText({ id, label, value, onChange }) {

    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

function TweakColor({ id, label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" value={value} onChange={(e) => onChange(e.target.value)}
          style={{width:56,height:22,border:'.5px solid rgba(0,0,0,.1)',borderRadius:6,padding:0,cursor:'default',background:'transparent',flexShrink:0}} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero] = colors;
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
              aria-checked={on} data-on={on ? '1' : '0'}
              style={{ background: hero }} onClick={() => onChange(o)}>
              {on && (
                <svg viewBox="0 0 14 14" aria-hidden="true" style={{position:'absolute',top:6,left:6,width:13,height:13,filter:'drop-shadow(0 1px 1px rgba(0,0,0,.3))'}}>

                </svg>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

      </section>

      {/* ═══ GUIDE ═══ */}
      <section style={{padding:'0 clamp(24px,6vw,64px) 80px', position:'relative', overflow:'hidden'}}>
        <EdgeDeco side="left" gold={gold}/>
        <EdgeDeco side="right" gold={gold}/>

        <div style={{textAlign:'center',marginBottom:52,maxWidth:1080,margin:'0 auto 52px'}}>
          <div style={{width:48,height:48,borderRadius:'50%',background:gold+'18',border:'1px solid '+gold+'30',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill={gold}><path d="M17.523 15.3414c-.5511 0-.9993-.4486-.9993-.9997s.4482-.9993.9993-.9993c.5511 0 .9993.4482.9993.9993.0001.5511-.4482.9997-.9993.9997m-11.046 0c-.5511 0-.9993-.4486-.9993-.9997s.4482-.9993.9993-.9993c.5511 0 .9993.4482.9993.9993 0 .5511-.4482.9997-.9993.9997m11.4045-6.02l1.9973-3.4592a.416.416 0 00-.1521-.5676.416.416 0 00-.5676.1521l-2.0223 3.503C15.5902 8.2439 13.8533 7.8508 12 7.8508s-3.5902.3931-5.1367 1.0989L4.841 5.4467a.4161.4161 0 00-.5677-.1521.4157.4157 0 00-.1521.5676l1.9973 3.4592C2.6889 11.1867.3432 14.6589 0 18.761h24c-.3435-4.1021-2.6892-7.5743-6.1185-9.4396"/></svg>
          </div>
          <h2 style={{fontFamily:T.fD,fontWeight:700,fontSize:'clamp(22px,3vw,32px)',letterSpacing:'-0.02em',color:T.text,marginBottom:10}}>Guía de Instalación</h2>
          <p style={{fontSize:15,color:T.text2,maxWidth:440,margin:'0 auto',lineHeight:1.65}}>Sigue estos sencillos pasos para instalar la app en tu dispositivo Android en un par de minutos.</p>
        </div>

        <div className="guide-grid" style={{display:'grid',gridTemplateColumns:'316px 1fr',gap:'0 56px',alignItems:'start',maxWidth:1080,margin:'0 auto'}}>

          {/* Phone (sticky) */}
          <div className="phone-sticky-col" style={{position:'sticky',top:40,alignSelf:'start',display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
            <PhoneFrame image={STEP_IMAGES[activeStep]} stepNum={activeStep+1} gold={gold}/>
            <div style={{display:'flex',gap:7,alignItems:'center'}}>
              {STEPS.map((_,i)=>(
                <div key={i} style={{width:i===activeStep?18:6,height:6,borderRadius:100,background:i===activeStep?gold:T.s3,transition:'all .3s'}}></div>
              ))}
            </div>
            <div style={{fontSize:11,color:T.text3,fontFamily:T.fD,fontWeight:600,letterSpacing:'0.04em'}}>
              PASO {activeStep+1} DE {STEPS.length}
            </div>
          </div>

          {/* Timeline */}
          <div className="tl-wrap" style={{position:'relative',paddingLeft:60}}>
            <div style={{position:'absolute',left:19,top:22,bottom:44,width:2,background:'linear-gradient(to bottom, '+gold+'55, '+gold+'08)'}}></div>

            {STEPS.map((step, idx) => (
              <div key={step.id} onMouseEnter={() => setActiveStep(idx)} style={{position:'relative',marginBottom: idx<STEPS.length-1 ? 24 : 0}}>
                <div className="tl-circle" style={{
                  position:'absolute',left:-46,top:20,
                  width:40,height:40,borderRadius:'50%',
                  background: idx===activeStep ? gold : T.s3,
                  color: idx===activeStep ? '#0E011D' : T.text3,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontFamily:T.fD,fontWeight:700,fontSize:16,
                  boxShadow:'0 0 0 4px '+bg+', 0 0 0 5px '+(idx===activeStep ? gold+'50' : 'transparent'),
                  transition:'all .3s', zIndex:1,
                }}>{step.id}</div>

                <div className="step-card" style={{
                  background:T.s1,
                  border:'1px solid '+(idx===activeStep ? gold+'28' : T.border),
                  borderRadius:14,padding:'20px 24px',
                }}>
                  <div style={{fontFamily:T.fD,fontWeight:700,fontSize:10,letterSpacing:'0.1em',color:gold,marginBottom:6}}>{step.label}</div>
                  <h3 style={{fontFamily:T.fD,fontWeight:700,fontSize:18,color:T.text,marginBottom:10,letterSpacing:'-0.015em'}}>{step.title}</h3>
                  <p style={{fontSize:14,color:T.text2,lineHeight:1.7}}>{step.desc}</p>

                  {step.extra==='button' && (
                    <a href="#" onClick={handleDownload}
                      style={{display:'inline-flex',alignItems:'center',gap:10,marginTop:16,background:gold,color:'#0E011D',border:'none',borderRadius:10,padding:'11px 22px',fontFamily:T.fD,fontWeight:700,fontSize:14,cursor:'pointer',textDecoration:'none'}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 16l-6-6h4V4h4v6h4l-6 6zm-8 4h16v-2H4v2z"/></svg>
                      Descargar APK aquí
                    </a>
                  )}

                  {step.extra==='code' && (
                    <div style={{marginTop:14}}>
                      <div style={{background:T.s3,border:'1px solid '+T.border,borderRadius:8,padding:'10px 16px',fontFamily:'monospace',fontSize:12.5,color:T.text2,lineHeight:1.5}}>{step.code}</div>
                      <p style={{marginTop:8,fontSize:12,color:T.text3,fontStyle:'italic',lineHeight:1.5}}>{step.note}</p>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Tweaks */}
      <TweaksPanel title="Tweaks">
        <TweakSection title="Marca">
          <TweakText id="brandName" label="Nombre" value={brand} onChange={(v) => setTweak('brandName', v)}/>
        </TweakSection>
        <TweakSection title="Colores">
          <TweakColor id="accentColor" label="Acento" value={gold} options={['#EB7A00','#22c55e','#6366f1','#e85d04','#E3DBEB']} onChange={(v) => setTweak('accentColor', v)}/>
          <TweakColor id="darkBg" label="Fondo" value={bg} options={['#0E011D','#0c0c0c','#070f0a','#0d0a14']} onChange={(v) => setTweak('darkBg', v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
